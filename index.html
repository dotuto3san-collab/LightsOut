<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LightsPuzzle</title>
    <style>
        :root { --bg-color: #000; --panel-color: #1a1a1a; --accent: #3b82f6; --text-main: #ffffff; }
        body { 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100dvh; 
            margin: 0; 
            color: var(--text-main); 
            font-family: system-ui, -apple-system, sans-serif; 
            touch-action: none;
            overflow: hidden; 
        }
        
        #game-container { 
            display: flex; 
            flex-direction: row; 
            width: 100vw; 
            height: 100dvh; 
            align-items: stretch; 
        }
        
        #canvas-area { 
            position: relative; 
            background-color: #000; 
            flex-grow: 1;
            overflow: hidden; 
            cursor: grab;
        }

        #inspector { 
            width: 280px; 
            display: flex; 
            flex-direction: column; 
            background-color: #222; 
            padding: 15px; 
            font-size: 14px; 
            box-sizing: border-box;
            position: relative;
            z-index: 100;
        }
        
        #toggleInspector {
            display: none;
            position: absolute;
            right: -50px;
            top: 20px;
            width: 50px;
            height: 50px;
            background: rgba(50, 50, 50, 0.9);
            border: 1px solid #777;
            border-left: none;
            border-radius: 0 10px 10px 0;
            z-index: 200;
            font-size: 24px;
            color: white;
        }

        .header { font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #555; padding-bottom: 5px; }
        .usage-text { 
            font-size: 11px; color: #fff; margin-bottom: 10px; line-height: 1.4; 
            background: rgba(255,255,255,0.1); padding: 8px; border-radius: 4px;
        }
        
        .scroll-area { flex-grow: 1; overflow-y: auto; background: #000; padding: 5px; border: 1px solid #444; margin-bottom: 15px; border-radius: 4px; }
        .click-entry { background-color: #333; padding: 8px; margin-bottom: 5px; border-radius: 4px; display: flex; gap: 8px; align-items: center; border: 1px solid #555; }
        .click-entry input { width: 50px; background-color: #111; color: #fff; border: 1px solid #888; text-align: center; font-size: 14px; padding: 4px; border-radius: 4px; }
        .active-entry { border: 1px solid #ffff00; background-color: #443; }

        canvas { display: block; width: 100%; height: 100%; }
        
        #langBtn, #menuBtn { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(0,0,0,0.7); color: white; border: 1px solid white; 
            padding: 10px 20px; z-index: 50; border-radius: 6px; font-weight: bold;
        }

        #extra-link { 
            position: absolute; top: 15px; left: 15px; z-index: 40; 
            background: rgba(136,34,34,0.9); color: #fff; padding: 10px 15px; 
            border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; border: 1px solid #922; 
        }

        #count-display { 
            position: absolute; bottom: 15px; right: 15px; 
            background: rgba(0,0,0,0.8); padding: 5px 15px; font-size: 18px; 
            color: #0f0; display: none; font-family: monospace; border: 1px solid #333; border-radius: 4px;
        }
        
        button { cursor: pointer; touch-action: manipulation; border: none; }
        .btn-plus { background-color: #22863a; padding: 5px 15px; font-size: 20px; color: white; border-radius: 4px; }
        
        .control-group { background: #333; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        .btn-start { background-color: #0366d6; padding: 12px; font-size: 14px; color: white; font-weight: bold; border-radius: 4px; }
        .btn-reset { background-color: #444; padding: 10px; font-size: 13px; color: white; border-radius: 4px; border: 1px solid #666; }

        @media (max-width: 1024px) {
            #inspector { 
                position: fixed; left: 0; top: 0; width: 320px; height: 100dvh;
                transform: translateX(-100%); transition: transform 0.3s ease;
                background-color: rgba(30, 30, 30, 0.98);
            }
            #inspector.open { transform: translateX(0); }
            #toggleInspector { display: block; }
            #canvas-area { width: 100vw; height: 100dvh; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="canvas-area">
        <a id="extra-link" href="https://ripple-game-8wz.pages.dev/">🔗 高難度版はこちら</a>
        <button id="langBtn" onclick="toggleLang()">JP/EN</button>
        <button id="menuBtn" onclick="backToTitle()" style="display: none;">MENU</button>
        <div id="count-display">0</div>
        <canvas id="gameCanvas" oncontextmenu="return false;"></canvas>
    </div>

    <div id="inspector" style="display: none;">
        <button id="toggleInspector" onclick="toggleInspector()">⚙</button>
        <div class="header">
            <span id="labelAutoPlay">Auto Play</span>
            <button class="btn-plus" onclick="addEntry()">+</button>
        </div>
        <div id="labelUsage" class="usage-text"></div>
        <div id="scrollArea" class="scroll-area"></div>
        <div class="control-group">
            <div style="display:flex; justify-content:space-between; font-size:12px; color: white;">
                <span id="labelSpeed">Speed</span><span>x<span id="speedVal">1.0</span></span>
            </div>
            <input type="range" id="speedRange" min="0.5" max="10.0" step="0.5" value="1.0" oninput="updateSpeed(this.value)" style="width: 100%;">
            <button id="autoStartBtn" class="btn-start" onclick="toggleAutoPlay()">START AUTO</button>
            <button id="btnResetBoard" class="btn-reset" onclick="resetBoard()">RESET BOARD</button>
            <button id="btnRetryLevel" style="background:#d4a017; padding:12px; display:none; color:white; font-weight:bold; border-radius:4px;" onclick="retryGame()">RETRY LEVEL</button>
        </div>
    </div>
</div>

<script>
const i18n = {
    ja: {
        rules: ["【遊び方】","・タイルをタップするとその場所と上下左右が反転します。","・全タイルを同じ色に揃えればクリアです。","","【操作】","・タップ：タイルの反転","・2本指ドラッグ：移動 / ピンチ：ズーム","","【モード】","・NORMAL: 全灰色から開始。","・CHALLENGE: ランダム状態から開始。"],
        titleDesc: "サイズ設定(2-128)：数字をタップして変更",
        normalBtn: "NORMAL", challengeBtn: "CHALLENGE",
        autoPlay: "Auto Play",
        usage: "＋で座標を追加。STARTで順次実行。(座標は0からスタート。20マスなら19、50なら49が最大値)",
        speed: "速度", startAuto: "START AUTO", stopAuto: "STOP AUTO", resetBoard: "RESET BOARD", retryLevel: "RETRY LEVEL",
        win: "CLEAR!!", moves: "手"
    },
    en: {
        rules: ["【HOW TO PLAY】","• Tapping a tile flips it and its 4 neighbors.","• Clear by making all tiles the same color.","","【CONTROLS】","• Tap: Flip / 2-Finger: Pan / Pinch: Zoom","","【MODES】","• NORMAL: Starts with all Gray.","• CHALLENGE: Starts randomized."],
        titleDesc: "Size(2-128): Tap numbers to change",
        normalBtn: "NORMAL", challengeBtn: "CHALLENGE",
        autoPlay: "Auto Play",
        usage: "Tap '+' to add points. START runs them. (Starts from 0. Max is Size-1)",
        speed: "Speed", startAuto: "START AUTO", stopAuto: "STOP AUTO", resetBoard: "RESET BOARD", retryLevel: "RETRY LEVEL",
        win: "YOU WIN!", moves: "MOVES"
    }
};

let currentLang = 'ja';
let state = 'TITLE', colsInput = "5", rowsInput = "5", activeInput = 'cols', board = null;
let isWin = false, moveCount = 0, initialBoardState = [];
let autoEntries = [], autoIndex = -1, isAutoPlaying = false, autoTimer = null, autoSpeed = 1000;
let scale = 1.0, camX = 0, camY = 0, isDragging = false, lastMouseX = 0, lastMouseY = 0;
let lastPinchDist = 0, isPinching = false, lastInteractionTime = 0;

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const inspector = document.getElementById('inspector'), menuBtn = document.getElementById('menuBtn');
const langBtn = document.getElementById('langBtn'), countDisplay = document.getElementById('count-display');

function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    if (state === 'PLAY' && board) {
        camX = canvas.width / 2;
        camY = canvas.height / 2;
    }
    draw();
}
window.addEventListener('resize', resize);

function toggleLang() { currentLang = currentLang === 'ja' ? 'en' : 'ja'; updateUIText(); draw(); }
function updateUIText() {
    const t = i18n[currentLang];
    document.getElementById('labelAutoPlay').innerText = t.autoPlay;
    document.getElementById('labelUsage').innerText = t.usage;
    document.getElementById('labelSpeed').innerText = t.speed;
    document.getElementById('btnResetBoard').innerText = t.resetBoard;
    document.getElementById('btnRetryLevel').innerText = t.retryLevel;
    document.getElementById('autoStartBtn').innerText = isAutoPlaying ? t.stopAuto : t.startAuto;
    countDisplay.innerText = `${moveCount} ${t.moves}`;
}

function initGame(mode) {
    let c = parseInt(colsInput) || 5, r = parseInt(rowsInput) || 5;
    board = { width: c, height: r, cells: new Array(c * r).fill(false) };
    board.toggle = (x, y) => {
        [[x,y],[x,y-1],[x,y+1],[x-1,y],[x+1,y]].forEach(([tx, ty]) => {
            if (tx >= 0 && tx < c && ty >= 0 && ty < r) board.cells[ty * c + tx] = !board.cells[ty * c + tx];
        });
    };
    if (mode === 'CHALLENGE') for(let i=0; i<c*r; i++) if(Math.random()>0.5) board.toggle(Math.floor(Math.random()*c), Math.floor(Math.random()*r));
    initialBoardState = [...board.cells];
    isWin = false; autoIndex = -1; moveCount = 0;
    scale = Math.min((canvas.width-40)/(c*50), (canvas.height-40)/(r*50), 1.0);
    camX = canvas.width / 2; camY = canvas.height / 2;
    state = 'PLAY'; inspector.style.display = 'flex'; menuBtn.style.display = 'block'; countDisplay.style.display = 'block'; langBtn.style.display = 'none';
    document.getElementById('extra-link').style.display = 'none';
    updateUIText(); resize();
}

function backToTitle() { stopAutoPlay(); state = 'TITLE'; inspector.style.display = 'none'; menuBtn.style.display = 'none'; countDisplay.style.display = 'none'; langBtn.style.display = 'block'; document.getElementById('extra-link').style.display = 'block'; resize(); }
function toggleInspector() { inspector.classList.toggle('open'); }

function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = i18n[currentLang];
    if (state === 'TITLE') {
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 42px sans-serif"; ctx.fillText("LightsPuzzle", canvas.width/2, 70);
        ctx.font = "bold 15px sans-serif"; ctx.textAlign = "left"; 
        t.rules.forEach((l, i) => ctx.fillText(l, canvas.width/2 - 160, 120 + i*22));
        ctx.textAlign = "center"; ctx.font = "bold 14px sans-serif"; ctx.fillText(t.titleDesc, canvas.width/2, 380);
        ctx.font = "bold 24px monospace";
        ctx.fillStyle = (activeInput==='cols')?"#3b82f6":"white"; ctx.fillText(`Cols: ${colsInput}`, canvas.width/2-80, 420); 
        ctx.fillStyle = (activeInput==='rows')?"#3b82f6":"white"; ctx.fillText(`Rows: ${rowsInput}`, canvas.width/2+80, 420);
        ctx.fillStyle = "#3b82f6"; ctx.fillRect(canvas.width/2-165, 460, 160, 50);
        ctx.fillStyle = "#991b1b"; ctx.fillRect(canvas.width/2+5, 460, 160, 50);
        ctx.fillStyle = "white"; ctx.font = "bold 16px sans-serif";
        ctx.fillText(t.normalBtn, canvas.width/2-85, 492); ctx.fillText(t.challengeBtn, canvas.width/2+85, 492);
    } else if (board) {
        ctx.translate(camX, camY); ctx.scale(scale, scale);
        const cellSize = 50, bW = board.width * cellSize, bH = board.height * cellSize;
        ctx.translate(-bW/2, -bH/2);
        for (let y=0; y<board.height; y++) {
            for (let x=0; x<board.width; x++) {
                ctx.fillStyle = board.cells[y*board.width+x] ? '#facc15' : '#333';
                ctx.fillRect(x*cellSize+1, y*cellSize+1, cellSize-2, cellSize-2);
            }
        }
        if (isWin) {
            ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 48px sans-serif"; ctx.fillText(t.win, canvas.width/2, canvas.height/2);
        }
    }
}

function handleInteraction(clientX, clientY) {
    if (Date.now() - lastInteractionTime < 100) return;
    lastInteractionTime = Date.now();
    const rect = canvas.getBoundingClientRect();
    const mx = clientX - rect.left; const my = clientY - rect.top;
    if (state === 'TITLE') {
        if (my > 460 && my < 510) {
            if (mx > canvas.width/2-165 && mx < canvas.width/2-5) initGame('NORMAL');
            else if (mx > canvas.width/2+5 && mx < canvas.width/2+165) initGame('CHALLENGE');
        } else if (my > 400 && my < 440) {
            activeInput = (mx < canvas.width/2) ? 'cols' : 'rows';
            let v = prompt("Size (2-128)", activeInput==='cols'?colsInput:rowsInput);
            if (v) { let n = parseInt(v); if(!isNaN(n)) { n=Math.max(2, Math.min(128, n)); if(activeInput==='cols')colsInput=n.toString(); else rowsInput=n.toString(); }}
            draw();
        }
    } else if (state === 'PLAY' && !isWin && !isAutoPlaying) {
        const worldX = (mx - camX) / scale + (board.width * 50) / 2;
        const worldY = (my - camY) / scale + (board.height * 50) / 2;
        const x = Math.floor(worldX / 50), y = Math.floor(worldY / 50);
        if (x>=0 && y>=0 && x<board.width && y<board.height) { board.toggle(x, y); moveCount++; updateUIText(); checkWin(); draw(); }
    }
}

canvas.addEventListener('mousedown', e => {
    lastMouseX = e.clientX; lastMouseY = e.clientY;
    if(e.button === 2 || e.button === 1) { isDragging = true; return; }
    handleInteraction(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => {
    if (isDragging) { camX += e.clientX - lastMouseX; camY += e.clientY - lastMouseY; draw(); }
    lastMouseX = e.clientX; lastMouseY = e.clientY;
});
window.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('wheel', e => { if(state==='PLAY') { e.preventDefault(); scale = Math.min(Math.max(scale * Math.exp(-e.deltaY * 0.001), 0.01), 50); draw(); } }, {passive:false});

canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { 
        lastMouseX = e.touches[0].clientX; 
        lastMouseY = e.touches[0].clientY; 
        isPinching = false; 
        isDragging = false; 
    }
    else if (e.touches.length === 2) { 
        isPinching = true; 
        lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); 
        lastMouseX = (e.touches[0].clientX + e.touches[1].clientX) / 2; 
        lastMouseY = (e.touches[0].clientY + e.touches[1].clientY) / 2; 
    }
}, {passive:false});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2; const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        scale = Math.min(Math.max(scale * (dist / lastPinchDist), 0.01), 50);
        camX += midX - lastMouseX; camY += midY - lastMouseY;
        lastPinchDist = dist; lastMouseX = midX; lastMouseY = midY; draw();
    }
}, {passive:false});
canvas.addEventListener('touchend', e => { if(!isPinching && e.changedTouches.length === 1) handleInteraction(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, {passive:false});

function checkWin() { if (board.cells.every(c => c)) { isWin = true; stopAutoPlay(); document.getElementById('btnRetryLevel').style.display = 'block'; } }
function toggleAutoPlay() { if (isAutoPlaying) stopAutoPlay(); else { if(autoEntries.length===0) return; isAutoPlaying=true; updateUIText(); processNextAuto(); } }
function stopAutoPlay() { isAutoPlaying=false; autoIndex=-1; clearTimeout(autoTimer); updateUIText(); renderInspector(); }
function processNextAuto() {
    if (!isAutoPlaying || isWin) return;
    autoIndex++; if (autoIndex >= autoEntries.length) autoIndex = 0;
    const e = autoEntries[autoIndex];
    if (e.x < board.width && e.y < board.height) { board.toggle(e.x, e.y); moveCount++; updateUIText(); checkWin(); }
    renderInspector(); draw(); autoTimer = setTimeout(processNextAuto, autoSpeed);
}
function addEntry() { autoEntries.push({ x: 0, y: 0, id: Date.now() }); renderInspector(); }
function removeEntry(id) { autoEntries = autoEntries.filter(e => e.id !== id); renderInspector(); }
function renderInspector() {
    const area = document.getElementById('scrollArea'); area.innerHTML = '';
    autoEntries.forEach((e, i) => {
        const d = document.createElement('div'); d.className = `click-entry ${i === autoIndex ? 'active-entry' : ''}`;
        d.innerHTML = `<span>#${i}</span>X:<input type="number" value="${e.x}" oninput="autoEntries[${i}].x=parseInt(this.value)||0">Y:<input type="number" value="${e.y}" oninput="autoEntries[${i}].y=parseInt(this.value)||0"><button style="background:#a44;padding:5px 10px;margin-left:auto;color:white;font-weight:bold;border:none;border-radius:4px;" onclick="removeEntry(${e.id})">×</button>`;
        area.appendChild(d);
    });
}
function updateSpeed(v) { autoSpeed = 1000 / parseFloat(v); document.getElementById('speedVal').innerText = parseFloat(v).toFixed(1); }
function resetBoard() { board.cells = [...initialBoardState]; isWin = false; moveCount = 0; updateUIText(); document.getElementById('btnRetryLevel').style.display = 'none'; draw(); }
function retryGame() { resetBoard(); stopAutoPlay(); }
resize();
</script>
</body>
</html>
